<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Your Login - GenLab Launchpad LMS</title>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0a0a0a;
      color: #ffffff;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    .wrapper {
      width: 100%;
      min-height: 100vh;
      background-color: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      background-color: #101010;
      border-radius: 32px;
      overflow: hidden;
      border: 1px solid #1a1a1a;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }
    .header {
      background-color: #101010;
      color: #ffffff;
      text-align: center;
      padding: 40px 20px 20px 20px;
      border-bottom: 1px solid #1a1a1a;
    }
    .logo-container {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .logo-box {
      background-color: #a1bf00;
      color: #111111;
      font-family: 'Clash Display', 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 20px;
      padding: 6px 12px;
      border-radius: 8px;
      letter-spacing: 1px;
      line-height: 1;
    }
    .logo {
      font-family: 'Clash Display', 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0;
      color: #ffffff;
    }
    .subtitle {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 8px 0 0 0;
      color: #cfff00;
    }
    .content {
      padding: 40px 40px;
      text-align: center;
    }
    h1 {
      font-family: 'Clash Display', 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 16px;
      color: #f4f4f4;
      letter-spacing: 1px;
    }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #b0b0b0;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }
    .otp-wrapper {
      margin: 32px 0;
    }
    .otp-container {
      background-color: #0a0a0a;
      border-radius: 10px;
      padding: 24px 32px;
      display: inline-block;
      border: 1px solid #cfff00;
      box-shadow: 0 0 20px rgba(207, 255, 0, 0.15);
    }
    .otp-code {
      font-family: 'Clash Display', 'Outfit', monospace;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: 10px;
      color: #cfff00;
      margin: 0;
      padding-left: 10px;
    }
    .footer {
      background-color: #0c0c0c;
      border-top: 1px solid #1a1a1a;
      padding: 30px 20px;
      text-align: center;
      font-size: 12px;
      color: #666666;
    }
    .footer p {
      font-size: 12px;
      color: #666666;
      margin: 6px 0;
    }
    .footer a {
      color: #cfff00;
      text-decoration: none;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .footer a:hover {
      color: #bcf000;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <div class="logo-container">
          <span class="logo-box">GL</span>
          <span class="logo">GenLab</span>
        </div>
        <div class="subtitle">Launchpad LMS</div>
      </div>
      <div class="content">
        <h1>Verify Your Identity</h1>
        <p>Please use the following 6-digit verification code to complete your login. This code will expire in 1 hour.</p>
        <div class="otp-wrapper">
          <div class="otp-container">
            <div class="otp-code">{{ .Token }}</div>
          </div>
        </div>
        <p style="font-size: 13px; color: #666666; margin-top: 28px; margin-bottom: 0;">If you did not request this code, you can safely ignore this email.</p>
      </div>
      <div class="footer">
        <p>&copy; 2026 GenLab. All rights reserved.</p>
        <p style="margin-top: 10px;"><a href="{{ .SiteURL }}">Visit Launchpad LMS &rarr;</a></p>
      </div>
    </div>
  </div>
</body>
</html>
